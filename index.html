<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dj Bites Pro · Premium Food Ordering</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px 12px 20px;
        }

        .dj-container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px 40px 32px 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            padding: 20px 18px 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: containerAppear 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transition: all 0.5s ease;
        }

        .dj-container.outlet-closed {
            opacity: 0.7;
            filter: grayscale(20%);
        }

        @keyframes containerAppear {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Firecracker Animation */
        .firecracker-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
            border-radius: 40px;
        }

        .cracker {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff0, #f90, #f00);
            filter: blur(1px);
            animation: explode 3s infinite;
            opacity: 0;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            25% { transform: translate(var(--tx1), var(--ty1)) scale(1.5); opacity: 0.8; }
            50% { transform: translate(var(--tx2), var(--ty2)) scale(2); opacity: 0.6; background: radial-gradient(circle, #f90, #f00, #ff0); }
            75% { transform: translate(var(--tx3), var(--ty3)) scale(1.2); opacity: 0.3; }
            100% { transform: translate(var(--tx4), var(--ty4)) scale(0); opacity: 0; }
        }

        .cracker:nth-child(1) { --tx1: 50px; --ty1: -30px; --tx2: 100px; --ty2: -60px; --tx3: 150px; --ty3: -30px; --tx4: 200px; --ty4: 0px; top: 20%; left: 10%; animation-delay: 0s; }
        .cracker:nth-child(2) { --tx1: -40px; --ty1: -50px; --tx2: -80px; --ty2: -100px; --tx3: -120px; --ty3: -50px; --tx4: -160px; --ty4: 0px; top: 30%; right: 10%; animation-delay: 0.5s; }
        .cracker:nth-child(3) { --tx1: 60px; --ty1: 40px; --tx2: 120px; --ty2: 80px; --tx3: 180px; --ty3: 40px; --tx4: 240px; --ty4: 0px; bottom: 20%; left: 20%; animation-delay: 1s; }
        .cracker:nth-child(4) { --tx1: -50px; --ty1: 30px; --tx2: -100px; --ty2: 60px; --tx3: -150px; --ty3: 30px; --tx4: -200px; --ty4: 0px; bottom: 30%; right: 20%; animation-delay: 1.5s; }

        /* Professional Logo */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 8px;
            animation: slideDown 0.6s ease;
            background: linear-gradient(145deg, #fff8f0, #fff);
            border-radius: 60px;
            padding: 12px 20px;
            box-shadow: 0 10px 25px rgba(252, 128, 25, 0.15);
            position: relative;
            overflow: hidden;
            z-index: 5;
        }

        .logo-firecracker {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ffaa00, #ff5500);
            border-radius: 50%;
            pointer-events: none;
            animation: logoSpark 2s infinite;
        }

        @keyframes logoSpark {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            25% { transform: scale(1.5) rotate(90deg); opacity: 0.8; }
            50% { transform: scale(2) rotate(180deg); opacity: 0.6; background: radial-gradient(circle, #ff5500, #ffaa00); }
            75% { transform: scale(1.5) rotate(270deg); opacity: 0.4; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .logo-firecracker:nth-child(1) { top: 10px; left: 20px; animation-delay: 0s; }
        .logo-firecracker:nth-child(2) { top: 5px; right: 30px; animation-delay: 0.3s; }
        .logo-firecracker:nth-child(3) { bottom: 5px; left: 40px; animation-delay: 0.6s; }
        .logo-firecracker:nth-child(4) { bottom: 10px; right: 20px; animation-delay: 0.9s; }
        .logo-firecracker:nth-child(5) { top: 50%; left: 10px; animation-delay: 1.2s; }
        .logo-firecracker:nth-child(6) { top: 50%; right: 10px; animation-delay: 1.5s; }

        .brand-title {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 6;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #fc8019, #ff5722);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(252, 128, 25, 0.4);
            transform: rotate(10deg);
            transition: all 0.3s;
            animation: logoFloat 3s infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: rotate(10deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.05); }
        }

        .logo-icon i {
            font-size: 2rem;
            color: white;
            transform: rotate(-10deg);
        }

        .logo-text h2 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fc8019, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Dancing Script', cursive;
        }

        .logo-tagline {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
        }

        .pure-veg-tag {
            background: linear-gradient(145deg, #0a7e07, #1e7b4c);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        /* Outlet Status */
        .outlet-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 40px;
            margin-bottom: 15px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: all 0.5s ease;
        }

        .status-dot.open {
            background: #0a7e07;
            box-shadow: 0 0 10px #0a7e07;
            animation: pulse 1.5s infinite;
        }

        .status-dot.closed {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .clear-today-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .clear-today-btn:hover {
            background: #ff0000;
            transform: translateY(-2px);
        }

        /* Order Counter */
        .order-counter-badge {
            background: linear-gradient(145deg, #fc8019, #ff5722);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .order-counter-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(252, 128, 25, 0.5);
        }

        /* Admin Area */
        .admin-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-btn {
            background: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .admin-btn:hover {
            background: #fc8019;
            transform: translateY(-2px);
        }

        .admin-indicator {
            background: linear-gradient(145deg, #fc8019, #ff5722);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout-btn {
            background: #eee;
            color: #333;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ddd;
        }

        /* Admin Panel */
        .admin-settings-panel {
            background: linear-gradient(145deg, #fff9f2, #fff);
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
            border: 2px solid #fc8019;
            animation: panelSlide 0.5s;
        }

        @keyframes panelSlide {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 50px;
        }

        /* 3D Flip Animation Toggle Switch */
        .toggle-switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            perspective: 200px;
        }

        .toggle-switch {
            position: relative;
            width: 70px;
            height: 34px;
            background: #ccc;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            transform-style: preserve-3d;
            animation: toggleIdle 3s infinite;
        }

        @keyframes toggleIdle {
            0%, 100% { transform: rotateY(0deg); }
            25% { transform: rotateY(5deg); }
            75% { transform: rotateY(-5deg); }
        }

        .toggle-switch.active {
            background: linear-gradient(145deg, #0a7e07, #1e7b4c);
            animation: toggleActive 3s infinite;
        }

        @keyframes toggleActive {
            0%, 100% { transform: rotateY(0deg) scale(1); }
            25% { transform: rotateY(10deg) scale(1.05); }
            75% { transform: rotateY(-10deg) scale(1.05); }
        }

        .toggle-switch:active {
            transform: scale(0.95) rotateY(180deg);
            transition: transform 0.2s;
        }

        .toggle-slider {
            position: absolute;
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transform: translateZ(5px);
        }

        .toggle-switch.active .toggle-slider {
            left: 39px;
            transform: translateZ(10px) scale(1.1);
        }

        .toggle-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }

        /* Add New Item Section */
        .add-item-section {
            background: linear-gradient(145deg, #fff0e0, #ffe0c0);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            border: 2px dashed #fc8019;
            animation: addItemPulse 2s infinite;
        }

        @keyframes addItemPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(252, 128, 25, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(252, 128, 25, 0.6); }
        }

        .add-item-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fc8019;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .add-item-input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #fc8019;
            border-radius: 40px;
            font-size: 0.95rem;
            margin: 8px 0;
        }

        .add-item-input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(252, 128, 25, 0.2);
        }

        .add-item-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .add-item-btn {
            background: linear-gradient(145deg, #fc8019, #ff5722);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-item-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(252, 128, 25, 0.4);
        }

        .admin-input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #fc8019;
            border-radius: 40px;
            font-size: 0.95rem;
            margin: 10px 0;
        }

        .save-btn {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 8px 0 20px;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
            white-space: nowrap;
            border: 2px solid #eee;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-tab i {
            color: #fc8019;
        }

        .category-tab:hover, .category-tab.active {
            background: #fc8019;
            color: white;
            border-color: #fc8019;
            transform: translateY(-2px);
        }

        .category-tab:hover i, .category-tab.active i {
            color: white;
        }

        /* Menu Items */
        .category-section {
            margin: 25px 0 15px;
            scroll-margin-top: 20px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 3px solid #fc8019;
        }

        .category-header i {
            font-size: 1.5rem;
            color: #fc8019;
            background: #fff4e5;
            padding: 8px;
            border-radius: 50%;
        }

        .category-header h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1f1f1f;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 15px;
            border-radius: 24px;
            margin-bottom: 12px;
            border: 2px solid #f0f0f0;
            transition: all 0.3s;
            position: relative;
            opacity: 1;
        }

        .menu-item.out-of-stock {
            opacity: 0.5;
            background: #f5f5f5;
            border-color: #ff4444;
            filter: grayscale(50%);
        }

        .menu-item.out-of-stock .qty-control {
            opacity: 0.3;
            pointer-events: none;
        }

        .out-of-stock-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4444;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 10;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .menu-item:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .item-image-block {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #f5f5f5, #e5e5e5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 1.5rem;
        }

        .image-placeholder span {
            font-size: 0.6rem;
        }

        .item-info {
            flex: 2;
        }

        .item-name {
            font-weight: 600;
            font-size: 1rem;
            color: #1f1f1f;
            margin-bottom: 5px;
        }

        .item-price {
            font-weight: 700;
            color: #fc8019;
            font-size: 1.1rem;
        }

        /* Admin Edit Fields */
        .admin-name-input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #fc8019;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .admin-name-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(252, 128, 25, 0.2);
        }

        .admin-price-input {
            width: 80px;
            padding: 5px 8px;
            border: 2px solid #fc8019;
            border-radius: 20px;
            font-weight: 600;
            text-align: center;
            font-size: 0.9rem;
            margin-right: 10px;
        }

        /* Stock Toggle */
        .stock-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .stock-toggle-btn {
            background: #f0f0f0;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stock-toggle-btn.out {
            background: #ff4444;
            color: white;
        }

        .stock-toggle-btn.in {
            background: #0a7e07;
            color: white;
        }

        .stock-toggle-btn:hover {
            transform: scale(1.05);
        }

        /* Quantity Control */
        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8f8f8;
            padding: 5px 12px;
            border-radius: 40px;
            border: 1px solid #eee;
            margin-left: auto;
            flex-shrink: 0;
        }

        .qty-btn {
            background: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1rem;
            font-weight: 600;
            color: #fc8019;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        .qty-btn:hover {
            background: #fc8019;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 5px 12px rgba(252, 128, 25, 0.3);
        }

        .qty-num {
            font-weight: 700;
            font-size: 1.1rem;
            min-width: 20px;
            text-align: center;
            color: #1f1f1f;
        }

        /* Cart Summary */
        .summary-wrap {
            background: linear-gradient(145deg, #fff9f2, #fff);
            border-radius: 30px;
            padding: 20px;
            margin: 25px 0 20px;
            box-shadow: 0 10px 25px rgba(252, 128, 25, 0.1);
            border: 2px solid rgba(252, 128, 25, 0.1);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            margin: 8px 0;
            color: #555;
        }

        .summary-row.total {
            font-weight: 700;
            font-size: 1.3rem;
            border-top: 2px dashed #fc8019;
            padding-top: 12px;
            margin-top: 12px;
            color: #1f1f1f;
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            background: linear-gradient(145deg, #25D366, #128C7E);
            color: white;
            border: none;
            width: 100%;
            padding: 18px 0;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3);
            transition: all 0.3s;
        }

        .whatsapp-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        /* Modals */
        .customer-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            animation: modalSlide 0.5s;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .order-summary-preview {
            background: #f9f9f9;
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .preview-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.9rem;
            border-bottom: 1px dashed #eee;
        }

        .preview-total {
            font-weight: 700;
            color: #fc8019;
            margin-top: 10px;
            text-align: right;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #eee;
            border-radius: 40px;
            font-size: 1rem;
            margin: 15px 0;
        }

        .modal-input:focus {
            border-color: #fc8019;
            box-shadow: 0 0 0 4px rgba(252, 128, 25, 0.2);
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn.primary {
            background: linear-gradient(145deg, #25D366, #128C7E);
            color: white;
        }

        .modal-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
        }

        .modal-btn.secondary {
            background: #f0f0f0;
            color: #666;
        }

        /* Notification */
        .notification {
            background: linear-gradient(145deg, #0a7e07, #0a9e07);
            color: white;
            padding: 16px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            margin: 16px 0;
            animation: notificationSlide 0.5s;
            box-shadow: 0 10px 20px rgba(10, 126, 7, 0.3);
        }

        @keyframes notificationSlide {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>

    <script>
        (function() {
            // ---------- BASE MENU ----------
            const BASE_ITEMS = [
                { id: 'veg-steam-4', name: 'Veg Steam Momos (4 pcs)', basePrice: 40, category: '🥟 Veg Momos' },
                { id: 'veg-steam-8', name: 'Veg Steam Momos (8 pcs)', basePrice: 80, category: '🥟 Veg Momos' },
                { id: 'veg-fried-4', name: 'Veg Fried Momos (4 pcs)', basePrice: 50, category: '🥟 Veg Momos' },
                { id: 'veg-fried-8', name: 'Veg Fried Momos (8 pcs)', basePrice: 90, category: '🥟 Veg Momos' },
                { id: 'veg-kurkure-4', name: 'Veg Kurkure Momos (4 pcs)', basePrice: 65, category: '🥟 Veg Momos' },
                { id: 'veg-kurkure-8', name: 'Veg Kurkure Momos (8 pcs)', basePrice: 125, category: '🥟 Veg Momos' },
                { id: 'veg-gravy-6', name: 'Veg Gravy Momos (6 pcs)', basePrice: 129, category: '🥟 Veg Momos' },
                { id: 'paneer-steam-4', name: 'Paneer Steam Momos (4 pcs)', basePrice: 50, category: '🧀 Paneer Momos' },
                { id: 'paneer-steam-8', name: 'Paneer Steam Momos (8 pcs)', basePrice: 100, category: '🧀 Paneer Momos' },
                { id: 'paneer-fried-4', name: 'Paneer Fried Momos (4 pcs)', basePrice: 60, category: '🧀 Paneer Momos' },
                { id: 'paneer-fried-8', name: 'Paneer Fried Momos (8 pcs)', basePrice: 110, category: '🧀 Paneer Momos' },
                { id: 'paneer-kurkure-4', name: 'Paneer Kurkure Momos (4 pcs)', basePrice: 85, category: '🧀 Paneer Momos' },
                { id: 'paneer-kurkure-8', name: 'Paneer Kurkure Momos (8 pcs)', basePrice: 155, category: '🧀 Paneer Momos' },
                { id: 'paneer-gravy-6', name: 'Paneer Gravy Momos (6 pcs)', basePrice: 139, category: '🧀 Paneer Momos' },
                { id: 'burger-aloo', name: 'DJ Aloo Tikki Burger', basePrice: 49, category: '🍔 Burgers' },
                { id: 'burger-veggie', name: 'DJ Veggie Burger', basePrice: 59, category: '🍔 Burgers' },
                { id: 'cheese-addon', name: 'Cheese Slice Add-on', basePrice: 10, category: '🍔 Burgers' },
                { id: 'spring-potato', name: 'Special Tandoori Spring Potato', basePrice: 39, category: '🥔 Spring Potato' },
                { id: 'fries-half', name: 'French Fries (Half)', basePrice: 20, category: '🍟 French Fries' },
                { id: 'fries-full', name: 'French Fries (Full)', basePrice: 30, category: '🍟 French Fries' }
            ];

            // ---------- STATE ----------
            let menuItems = [];
            let quantities = {};
            let itemImages = {};
            let adminActive = false;
            let whatsappNumber = '919540828708';
            let whatsappDisplay = '+91 95408 28708';
            
            // New States
            let outletOpen = true;
            let outOfStockItems = JSON.parse(localStorage.getItem('dj_bites_out_of_stock')) || [];
            
            // Order tracking
            let orders = JSON.parse(localStorage.getItem('dj_bites_orders')) || [];

            // Speech Synthesis for Voice Announcement
            function speakItemName(itemName) {
                if ('speechSynthesis' in window) {
                    // Stop any ongoing speech
                    window.speechSynthesis.cancel();
                    
                    const utterance = new SpeechSynthesisUtterance(itemName);
                    utterance.lang = 'hi-IN'; // Hindi support
                    utterance.rate = 0.9; // Slightly slow
                    utterance.pitch = 1.2; // Slightly high pitch for friendly tone
                    
                    // Try to get a female voice
                    const voices = window.speechSynthesis.getVoices();
                    const femaleVoice = voices.find(voice => voice.name.includes('Female') || voice.name.includes('Google हिन्दी'));
                    if (femaleVoice) {
                        utterance.voice = femaleVoice;
                    }
                    
                    window.speechSynthesis.speak(utterance);
                }
            }

            // Audio System
            let audioCtx = null;
            let masterGain = null;
            let lastSoundTime = 0;
            const SOUND_COOLDOWN = 100;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    masterGain = audioCtx.createGain();
                    masterGain.connect(audioCtx.destination);
                    masterGain.gain.value = 0.25;
                }
                return audioCtx;
            }

            function playSound(type) {
                try {
                    const now = Date.now();
                    if (now - lastSoundTime < SOUND_COOLDOWN) return;
                    lastSoundTime = now;

                    const ctx = initAudio();
                    if (ctx.state === 'suspended') {
                        ctx.resume().then(() => playSound(type));
                        return;
                    }

                    const currentTime = ctx.currentTime;
                    
                    if (type === 'click') {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(masterGain);
                        
                        osc.frequency.value = 620;
                        gain.gain.setValueAtTime(0.12, currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.08);
                        
                        osc.start(currentTime);
                        osc.stop(currentTime + 0.08);
                    }
                    else if (type === 'add') {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(masterGain);
                        
                        osc.frequency.value = 740;
                        gain.gain.setValueAtTime(0.15, currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.1);
                        
                        osc.start(currentTime);
                        osc.stop(currentTime + 0.1);
                    }
                    else if (type === 'remove') {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(masterGain);
                        
                        osc.frequency.value = 440;
                        gain.gain.setValueAtTime(0.12, currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.12);
                        
                        osc.start(currentTime);
                        osc.stop(currentTime + 0.12);
                    }
                    else if (type === 'order') {
                        const notes = [523, 659, 783, 880];
                        notes.forEach((freq, i) => {
                            setTimeout(() => {
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.connect(gain);
                                gain.connect(masterGain);
                                
                                osc.frequency.value = freq;
                                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                                
                                osc.start();
                                osc.stop(ctx.currentTime + 0.15);
                            }, i * 120);
                        }, this);
                    }
                    else if (type === 'success') {
                        const osc1 = ctx.createOscillator();
                        const osc2 = ctx.createOscillator();
                        const gain = ctx.createGain();
                        
                        osc1.connect(gain);
                        osc2.connect(gain);
                        gain.connect(masterGain);
                        
                        osc1.frequency.value = 659;
                        osc2.frequency.value = 1318;
                        
                        gain.gain.setValueAtTime(0.15, currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.25);
                        
                        osc1.start(currentTime);
                        osc2.start(currentTime);
                        osc1.stop(currentTime + 0.25);
                        osc2.stop(currentTime + 0.25);
                    }
                    else if (type === 'error') {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(masterGain);
                        
                        osc.frequency.value = 220;
                        gain.gain.setValueAtTime(0.15, currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.2);
                        
                        osc.start(currentTime);
                        osc.stop(currentTime + 0.2);
                    }
                    else if (type === 'toggle') {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(masterGain);
                        
                        osc.frequency.value = 880;
                        gain.gain.setValueAtTime(0.1, currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.05);
                        
                        osc.start(currentTime);
                        osc.stop(currentTime + 0.05);
                    }
                } catch (e) { /* Silent fallback */ }
            }

            // Load data
            function loadStored() {
                const storedPrices = localStorage.getItem('dj_bites_prices');
                if (storedPrices) {
                    try {
                        const priceMap = JSON.parse(storedPrices);
                        menuItems = BASE_ITEMS.map(item => ({
                            ...item,
                            price: priceMap[item.id] !== undefined ? priceMap[item.id] : item.basePrice
                        }));
                    } catch { fallback(); }
                } else { fallback(); }
                
                function fallback() {
                    menuItems = BASE_ITEMS.map(item => ({ ...item, price: item.basePrice }));
                }

                // Load custom items
                const storedItems = localStorage.getItem('dj_bites_custom_items');
                if (storedItems) {
                    try {
                        const customItems = JSON.parse(storedItems);
                        customItems.forEach(customItem => {
                            if (!menuItems.find(item => item.id === customItem.id)) {
                                menuItems.push(customItem);
                            }
                        });
                    } catch { }
                }

                const storedImages = localStorage.getItem('dj_bites_images');
                if (storedImages) {
                    try { itemImages = JSON.parse(storedImages) || {}; } catch { itemImages = {}; }
                } else { itemImages = {}; }

                const storedWA = localStorage.getItem('dj_bites_whatsapp');
                if (storedWA) {
                    try {
                        const wa = JSON.parse(storedWA);
                        whatsappNumber = wa.number || '919540828708';
                        whatsappDisplay = wa.display || '+91 95408 28708';
                    } catch { }
                }

                const storedOutlet = localStorage.getItem('dj_bites_outlet');
                if (storedOutlet) {
                    outletOpen = storedOutlet === 'true';
                }

                // Load custom names
                const storedNames = localStorage.getItem('dj_bites_names');
                if (storedNames) {
                    try {
                        const nameMap = JSON.parse(storedNames);
                        menuItems = menuItems.map(item => ({
                            ...item,
                            name: nameMap[item.id] || item.name
                        }));
                    } catch { }
                }

                menuItems.forEach(item => quantities[item.id] = 0);
            }
            loadStored();

            // Save all settings
            function saveAllSettings() {
                const priceMap = {};
                const nameMap = {};
                menuItems.forEach(item => {
                    priceMap[item.id] = item.price;
                    nameMap[item.id] = item.name;
                });
                localStorage.setItem('dj_bites_prices', JSON.stringify(priceMap));
                localStorage.setItem('dj_bites_names', JSON.stringify(nameMap));
                localStorage.setItem('dj_bites_images', JSON.stringify(itemImages));
                localStorage.setItem('dj_bites_whatsapp', JSON.stringify({ number: whatsappNumber, display: whatsappDisplay }));
                localStorage.setItem('dj_bites_out_of_stock', JSON.stringify(outOfStockItems));
                localStorage.setItem('dj_bites_outlet', outletOpen.toString());
                
                // Save custom items separately
                const customItems = menuItems.filter(item => 
                    !BASE_ITEMS.find(baseItem => baseItem.id === item.id)
                );
                localStorage.setItem('dj_bites_custom_items', JSON.stringify(customItems));
                
                showNotification('✅ Settings saved!');
                playSound('success');
            }

            // Show notification
            function showNotification(msg) {
                const notifDiv = document.getElementById('notificationArea');
                notifDiv.innerHTML = `<div class="notification">${msg}</div>`;
                setTimeout(() => { notifDiv.innerHTML = ''; }, 2500);
            }

            // Clear today's orders
            window.clearTodayOrders = function() {
                const pwd = prompt('Enter password to clear today\'s orders:');
                if (pwd === 'dj@123') {
                    const today = new Date().toDateString();
                    orders = orders.filter(order => new Date(order.timestamp).toDateString() !== today);
                    localStorage.setItem('dj_bites_orders', JSON.stringify(orders));
                    updateTotalOrdersDisplay();
                    showNotification('🗑️ Today\'s orders cleared!');
                    playSound('success');
                } else {
                    alert('Incorrect password');
                    playSound('error');
                }
            };

            // Toggle outlet status - With 3D animation
            window.toggleOutlet = function() {
                outletOpen = !outletOpen;
                
                // Update UI
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                const container = document.getElementById('djBitesApp');
                const adminToggle = document.getElementById('adminOutletToggle');
                const adminLabel = document.getElementById('adminToggleLabel');
                
                if (outletOpen) {
                    statusDot.className = 'status-dot open';
                    statusText.textContent = 'Outlet Open';
                    container.classList.remove('outlet-closed');
                    if (adminToggle) {
                        adminToggle.classList.add('active');
                        adminLabel.textContent = 'Open';
                    }
                } else {
                    statusDot.className = 'status-dot closed';
                    statusText.textContent = 'Outlet Closed';
                    container.classList.add('outlet-closed');
                    if (adminToggle) {
                        adminToggle.classList.remove('active');
                        adminLabel.textContent = 'Closed';
                    }
                }
                
                document.getElementById('orderBtn').disabled = !outletOpen;
                localStorage.setItem('dj_bites_outlet', outletOpen.toString());
                playSound('toggle');
                showNotification(outletOpen ? '🟢 Outlet is now OPEN' : '🔴 Outlet is now CLOSED');
            };

            // Add new item
            window.addNewItem = function() {
                const name = document.getElementById('newItemName').value.trim();
                const price = parseInt(document.getElementById('newItemPrice').value);
                const category = document.getElementById('newItemCategory').value.trim();
                
                if (!name || !price || !category) {
                    alert('Please fill all fields');
                    playSound('error');
                    return;
                }
                
                // Generate unique ID
                const id = 'custom-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                
                const newItem = {
                    id: id,
                    name: name,
                    basePrice: price,
                    price: price,
                    category: category
                };
                
                menuItems.push(newItem);
                quantities[id] = 0;
                
                // Clear inputs
                document.getElementById('newItemName').value = '';
                document.getElementById('newItemPrice').value = '';
                document.getElementById('newItemCategory').value = '';
                
                saveAllSettings();
                renderMenu();
                renderCategoryTabs();
                
                showNotification('✅ New item added!');
                playSound('success');
            };

            // Toggle item stock
            window.toggleStock = function(itemId) {
                if (outOfStockItems.includes(itemId)) {
                    outOfStockItems = outOfStockItems.filter(id => id !== itemId);
                } else {
                    outOfStockItems.push(itemId);
                }
                renderMenu();
                playSound('toggle');
            };

            // Update item name
            window.updateItemName = function(itemId, newName) {
                const item = menuItems.find(i => i.id === itemId);
                if (item) {
                    item.name = newName;
                    playSound('click');
                }
            };

            // Generate order ID
            function generateOrderId() {
                const now = new Date();
                const date = now.getDate().toString().padStart(2, '0');
                const month = (now.getMonth() + 1).toString().padStart(2, '0');
                const year = now.getFullYear().toString().slice(-2);
                const random = Math.floor(1000 + Math.random() * 9000);
                return `${date}${month}${year}-${random}`;
            }

            // Get order count
            function getOrderCountForPhone(phone) {
                const today = new Date().toDateString();
                return orders.filter(order => 
                    order.phone === phone && 
                    new Date(order.timestamp).toDateString() === today
                ).length;
            }

            // Update total orders display
            function updateTotalOrdersDisplay() {
                const today = new Date().toDateString();
                const todayOrders = orders.filter(order => new Date(order.timestamp).toDateString() === today).length;
                document.getElementById('totalOrdersCount').textContent = todayOrders;
            }

            // Save order
            function saveOrder(customerName, phone, items, total) {
                const orderId = generateOrderId();
                const order = {
                    id: orderId,
                    name: customerName,
                    phone: phone,
                    items: items,
                    total: total,
                    timestamp: new Date().toISOString()
                };
                
                orders.push(order);
                localStorage.setItem('dj_bites_orders', JSON.stringify(orders));
                updateTotalOrdersDisplay();
                return orderId;
            }

            // Get order preview
            function getOrderPreviewHTML() {
                let html = '';
                let total = 0;
                let hasItems = false;
                
                menuItems.forEach(item => {
                    if (outOfStockItems.includes(item.id)) return;
                    const qty = quantities[item.id];
                    if (qty > 0) {
                        hasItems = true;
                        const itemTotal = qty * item.price;
                        total += itemTotal;
                        html += `
                            <div class="preview-item">
                                <span>${item.name} x ${qty}</span>
                                <span>₹${itemTotal}</span>
                            </div>
                        `;
                    }
                });
                
                if (!hasItems) {
                    html = '<div style="text-align: center; color: #999; padding: 20px;">No items selected</div>';
                } else {
                    html += `<div class="preview-total">Total: ₹${total}</div>`;
                }
                
                return html;
            }

            // Show order history
            window.showOrderHistory = function() {
                const today = new Date().toDateString();
                const todayOrders = orders.filter(order => new Date(order.timestamp).toDateString() === today);
                
                let historyHtml = '';
                if (todayOrders.length === 0) {
                    historyHtml = '<div style="text-align: center; padding: 20px; color: #999;">No orders today</div>';
                } else {
                    todayOrders.reverse().forEach(order => {
                        const time = new Date(order.timestamp).toLocaleTimeString();
                        historyHtml += `
                            <div class="preview-item" style="flex-direction: column; align-items: flex-start; gap: 5px;">
                                <div style="display: flex; justify-content: space-between; width: 100%;">
                                    <span style="font-weight: 700; color: #fc8019;">#${order.id}</span>
                                    <span style="font-weight: 700;">₹${order.total}</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; width: 100%; font-size: 0.85rem;">
                                    <span>${order.name}</span>
                                    <span style="color: #999;">${time}</span>
                                </div>
                            </div>
                        `;
                    });
                }
                
                document.getElementById('orderHistoryList').innerHTML = historyHtml;
                document.getElementById('historyModal').style.display = 'flex';
                playSound('click');
            };

            window.closeHistoryModal = function() {
                document.getElementById('historyModal').style.display = 'none';
            };

            // Modal functions
            window.openCustomerModal = function() {
                if (!outletOpen) {
                    alert('❌ Outlet is currently closed. Please visit during opening hours.');
                    playSound('error');
                    return;
                }
                
                const preview = getOrderPreviewHTML();
                document.getElementById('orderPreview').innerHTML = preview;
                document.getElementById('modalPhone').textContent = whatsappDisplay;
                document.getElementById('customerModal').style.display = 'flex';
                playSound('click');
            };

            window.closeModal = function() {
                document.getElementById('customerModal').style.display = 'none';
                document.getElementById('customerName').value = '';
            };

            window.submitCustomerInfo = function() {
                const name = document.getElementById('customerName').value.trim();
                if (!name) {
                    alert('Please enter your name');
                    playSound('error');
                    return;
                }
                
                closeModal();
                placeOrder(name);
            };

            // Place order
            function placeOrder(customerName) {
                let orderLines = [];
                let orderItems = [];
                let totalPrice = 0;
                
                menuItems.forEach(item => {
                    if (outOfStockItems.includes(item.id)) return;
                    const qty = quantities[item.id];
                    if (qty > 0) {
                        const itemTotal = qty * item.price;
                        totalPrice += itemTotal;
                        orderLines.push(`• ${item.name} × ${qty} = ₹${itemTotal}`);
                        orderItems.push({ name: item.name, qty: qty, price: item.price, total: itemTotal });
                    }
                });
                
                if (orderLines.length === 0) {
                    alert('Please add items to your order 🛒');
                    playSound('error');
                    return;
                }
                
                const orderId = saveOrder(customerName, whatsappNumber, orderItems, totalPrice);
                const orderCount = getOrderCountForPhone(whatsappNumber);
                
                let message = `🍔 *DJ BITES - PURE VEG* 🍔\n\n`;
                message += `👤 *Customer:* ${customerName}\n`;
                message += `📱 *Phone:* ${whatsappDisplay}\n`;
                message += `🆔 *Order ID:* #${orderId}\n`;
                message += `📊 *Order #${orderCount} today*\n\n`;
                message += `*YOUR ORDER:*\n`;
                message += orderLines.join('\n');
                message += `\n\n*TOTAL: ₹${totalPrice}*\n\n`;
                message += `🙏 Thank you for ordering!\n`;
                message += `⭐ Visit again - DJ Bites`;

                playSound('order');
                
                const encodedMessage = encodeURIComponent(message);
                window.open(`https://wa.me/${whatsappNumber}?text=${encodedMessage}`, '_blank');
                
                // Clear quantities
                menuItems.forEach(item => quantities[item.id] = 0);
                renderMenu();
                showNotification(`🎉 Order #${orderId} placed!`);
            }

            // DOM elements
            const menuContainer = document.getElementById('menuContainer');
            const totalItemsSpan = document.getElementById('totalItems');
            const totalPriceSpan = document.getElementById('totalPrice');
            const totalPaySpan = document.getElementById('totalPay');
            const adminArea = document.getElementById('adminArea');
            const adminSettingsPanel = document.getElementById('adminSettingsPanel');
            const orderBtn = document.getElementById('orderBtn');
            const categoryTabs = document.getElementById('categoryTabs');

            // Set initial UI
            function updateOutletUI() {
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                const container = document.getElementById('djBitesApp');
                
                if (outletOpen) {
                    statusDot.className = 'status-dot open';
                    statusText.textContent = 'Outlet Open';
                    container.classList.remove('outlet-closed');
                } else {
                    statusDot.className = 'status-dot closed';
                    statusText.textContent = 'Outlet Closed';
                    container.classList.add('outlet-closed');
                }
                orderBtn.disabled = !outletOpen;
            }
            updateOutletUI();

            // Get unique categories
            const categories = [...new Set(menuItems.map(item => item.category))];

            function getCategoryIcon(category) {
                if (category.includes('Momos')) return 'fa-dumpling';
                if (category.includes('Paneer')) return 'fa-cheese';
                if (category.includes('Burger')) return 'fa-burger';
                if (category.includes('Spring')) return 'fa-seedling';
                if (category.includes('Fries')) return 'fa-french-fries';
                return 'fa-utensils';
            }

            // Render category tabs
            function renderCategoryTabs() {
                let tabsHtml = '';
                categories.forEach((cat, index) => {
                    tabsHtml += `<div class="category-tab ${index === 0 ? 'active' : ''}" onclick="scrollToCategory('${cat.replace(/'/g, "\\'")}', this)">
                        <i class="fas ${getCategoryIcon(cat)}"></i> ${cat.split(' ')[1] || cat}
                    </div>`;
                });
                categoryTabs.innerHTML = tabsHtml;
            }

            // Scroll to category
            window.scrollToCategory = function(category, element) {
                document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
                element.classList.add('active');
                
                const categoryElement = document.getElementById(`category-${category.replace(/\s+/g, '-')}`);
                if (categoryElement) {
                    categoryElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                playSound('click');
            };

            // Admin header
            function renderAdminHeader() {
                if (adminActive) {
                    adminArea.innerHTML = `
                        <span class="admin-indicator"><i class="fas fa-lock-open"></i> Admin</span>
                        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Exit</button>
                    `;
                    document.getElementById('logoutBtn')?.addEventListener('click', () => {
                        adminActive = false;
                        renderAdminHeader();
                        renderMenu();
                        adminSettingsPanel.style.display = 'none';
                        playSound('click');
                    });

                    adminSettingsPanel.style.display = 'block';
                    adminSettingsPanel.innerHTML = `
                        <div class="admin-settings-panel">
                            <!-- Add New Item Section -->
                            <div class="add-item-section">
                                <div class="add-item-title">
                                    <i class="fas fa-plus-circle"></i> Add New Item
                                </div>
                                <input type="text" class="add-item-input" id="newItemName" placeholder="Item Name (e.g., Paneer Tikka)">
                                <div class="add-item-row">
                                    <input type="number" class="add-item-input" id="newItemPrice" placeholder="Price (₹)" style="width: 40%;">
                                    <input type="text" class="add-item-input" id="newItemCategory" placeholder="Category (e.g., 🍔 Burgers)" style="width: 60%;">
                                </div>
                                <button class="add-item-btn" onclick="addNewItem()">
                                    <i class="fas fa-plus"></i> Add to Menu
                                </button>
                            </div>

                            <div class="admin-toggle-row">
                                <span><i class="fas fa-store"></i> Outlet Status</span>
                                <div class="toggle-switch-container">
                                    <span class="toggle-label" id="adminToggleLabel">${outletOpen ? 'Open' : 'Closed'}</span>
                                    <div class="toggle-switch ${outletOpen ? 'active' : ''}" id="adminOutletToggle" onclick="toggleOutlet()">
                                        <div class="toggle-slider"></div>
                                    </div>
                                </div>
                            </div>
                            <div style="margin: 15px 0;">
                                <label style="font-weight: 600;"><i class="fab fa-whatsapp"></i> WhatsApp Number:</label>
                                <input type="text" class="admin-input" id="waNumberInput" value="${whatsappNumber}">
                            </div>
                            <div style="margin: 15px 0;">
                                <label style="font-weight: 600;"><i class="fas fa-globe"></i> Display Format:</label>
                                <input type="text" class="admin-input" id="waDisplayInput" value="${whatsappDisplay}">
                            </div>
                            <button class="save-btn" id="adminSaveBtn"><i class="fas fa-save"></i> Save Changes</button>
                        </div>
                    `;

                    document.getElementById('adminSaveBtn')?.addEventListener('click', function() {
                        const newNumber = document.getElementById('waNumberInput')?.value.trim();
                        const newDisplay = document.getElementById('waDisplayInput')?.value.trim();
                        if (newNumber) whatsappNumber = newNumber;
                        if (newDisplay) whatsappDisplay = newDisplay;
                        saveAllSettings();
                    });

                } else {
                    adminArea.innerHTML = `
                        <button class="admin-btn" id="adminLoginBtn"><i class="fas fa-lock"></i> Admin</button>
                    `;
                    document.getElementById('adminLoginBtn')?.addEventListener('click', () => {
                        const pwd = prompt('Enter admin password:');
                        if (pwd === 'dj@123') {
                            adminActive = true;
                            renderAdminHeader();
                            renderMenu();
                            playSound('success');
                        } else {
                            alert('Incorrect password');
                            playSound('error');
                        }
                    });
                    adminSettingsPanel.style.display = 'none';
                }
            }

            // Render menu
            function renderMenu() {
                let html = '';
                categories.forEach(cat => {
                    const catId = `category-${cat.replace(/\s+/g, '-')}`;
                    html += `<div id="${catId}" class="category-section">`;
                    html += `<div class="category-header"><i class="fas ${getCategoryIcon(cat)}"></i><h3>${cat}</h3></div>`;
                    
                    const catItems = menuItems.filter(item => item.category === cat);
                    catItems.forEach(item => {
                        const itemId = item.id;
                        const isOutOfStock = outOfStockItems.includes(itemId);
                        const imgSrc = itemImages[itemId] || '';
                        const imgHtml = imgSrc ? 
                            `<img class="item-image" src="${imgSrc}" alt="${item.name}">` : 
                            `<div class="image-placeholder"><i class="fas fa-image"></i><span>photo</span></div>`;

                        if (adminActive) {
                            html += `
                                <div class="menu-item ${isOutOfStock ? 'out-of-stock' : ''}">
                                    ${isOutOfStock ? '<div class="out-of-stock-badge"><i class="fas fa-times-circle"></i> OUT OF STOCK</div>' : ''}
                                    <div class="item-image-block">
                                        <div style="position: relative; width: 100%; height: 100%;">
                                            ${imgHtml}
                                            <label for="admin-file-${itemId}" style="position: absolute; bottom: 5px; right: 5px; background: #fc8019; color: white; padding: 3px 6px; border-radius: 20px; font-size: 0.6rem; cursor: pointer;"><i class="fas fa-camera"></i></label>
                                            <input type="file" id="admin-file-${itemId}" style="display: none;" accept="image/*" onchange="handleAdminImage('${itemId}', event)">
                                        </div>
                                    </div>
                                    <div class="item-info">
                                        <input type="text" class="admin-name-input" id="name-${itemId}" value="${item.name}" onchange="updateItemName('${itemId}', this.value)" placeholder="Item name">
                                        <div style="display: flex; align-items: center; gap: 5px; margin-top: 5px;">
                                            <span>₹</span>
                                            <input type="number" class="admin-price-input" id="price-${itemId}" value="${item.price}" step="1" min="0" onchange="updatePrice('${itemId}', this.value)">
                                        </div>
                                        <div class="stock-toggle">
                                            <button class="stock-toggle-btn ${isOutOfStock ? 'out' : 'in'}" onclick="toggleStock('${itemId}')">
                                                ${isOutOfStock ? '<i class="fas fa-times-circle"></i> Out of Stock' : '<i class="fas fa-check-circle"></i> In Stock'}
                                            </button>
                                        </div>
                                    </div>
                                    <div class="qty-control">
                                        <button class="qty-btn" onclick="window.updateQty('${item.id}', -1)"><i class="fas fa-minus"></i></button>
                                        <span class="qty-num" id="qty-${item.id}">${quantities[item.id]}</span>
                                        <button class="qty-btn" onclick="window.updateQty('${item.id}', 1)"><i class="fas fa-plus"></i></button>
                                    </div>
                                </div>
                            `;
                        } else {
                            if (isOutOfStock) {
                                html += `
                                    <div class="menu-item out-of-stock">
                                        <div class="out-of-stock-badge"><i class="fas fa-times-circle"></i> OUT OF STOCK</div>
                                        <div class="item-image-block">${imgHtml}</div>
                                        <div class="item-info">
                                            <div class="item-name">${item.name}</div>
                                            <div class="item-price">₹${item.price}</div>
                                        </div>
                                        <div class="qty-control" style="opacity: 0.3; pointer-events: none;">
                                            <button class="qty-btn"><i class="fas fa-minus"></i></button>
                                            <span class="qty-num">0</span>
                                            <button class="qty-btn"><i class="fas fa-plus"></i></button>
                                        </div>
                                    </div>
                                `;
                            } else {
                                html += `
                                    <div class="menu-item">
                                        <div class="item-image-block">${imgHtml}</div>
                                        <div class="item-info">
                                            <div class="item-name">${item.name}</div>
                                            <div class="item-price">₹${item.price}</div>
                                        </div>
                                        <div class="qty-control">
                                            <button class="qty-btn" onclick="window.updateQty('${item.id}', -1)"><i class="fas fa-minus"></i></button>
                                            <span class="qty-num" id="qty-${item.id}">${quantities[item.id]}</span>
                                            <button class="qty-btn" onclick="window.updateQty('${item.id}', 1)"><i class="fas fa-plus"></i></button>
                                        </div>
                                    </div>
                                `;
                            }
                        }
                    });
                    html += `</div>`;
                });
                menuContainer.innerHTML = html;
                updateTotals();
            }

            // Image handler
            window.handleAdminImage = function(itemId, event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    itemImages[itemId] = e.target.result;
                    renderMenu();
                    showNotification('📸 Image updated!');
                    playSound('success');
                };
                reader.readAsDataURL(file);
                event.target.value = '';
            };

            // Price update
            window.updatePrice = function(itemId, newPrice) {
                const price = parseInt(newPrice, 10) || 0;
                const item = menuItems.find(i => i.id === itemId);
                if (item) {
                    item.price = price;
                    updateTotals();
                    playSound('click');
                }
            };

            // Quantity update - With voice announcement
            window.updateQty = function(id, delta) {
                if (!outletOpen) {
                    alert('❌ Outlet is closed. Please visit during opening hours.');
                    playSound('error');
                    return;
                }
                
                if (outOfStockItems.includes(id)) {
                    alert('❌ This item is currently out of stock');
                    playSound('error');
                    return;
                }
                
                const newVal = quantities[id] + delta;
                if (newVal >= 0) {
                    quantities[id] = newVal;
                    const qtySpan = document.getElementById(`qty-${id}`);
                    if (qtySpan) qtySpan.innerText = newVal;
                    updateTotals();
                    
                    if (delta > 0) {
                        // Get item name and speak it
                        const item = menuItems.find(i => i.id === id);
                        if (item) {
                            speakItemName(item.name);
                        }
                        playSound('add');
                    } else {
                        playSound('remove');
                    }
                }
            };

            // Update totals
            function updateTotals() {
                let totalItems = 0, totalPrice = 0;
                menuItems.forEach(item => {
                    if (!outOfStockItems.includes(item.id)) {
                        const q = quantities[item.id];
                        totalItems += q;
                        totalPrice += q * item.price;
                    }
                });
                totalItemsSpan.innerText = totalItems;
                totalPriceSpan.innerText = `₹${totalPrice}`;
                totalPaySpan.innerText = `₹${totalPrice}`;
            }

            // Order button click
            orderBtn.addEventListener('click', function() {
                if (!outletOpen) {
                    alert('❌ Outlet is currently closed. Please visit during opening hours.');
                    playSound('error');
                    return;
                }
                
                let hasItems = false;
                menuItems.forEach(item => {
                    if (!outOfStockItems.includes(item.id) && quantities[item.id] > 0) hasItems = true;
                });
                
                if (!hasItems) {
                    alert('Please add items to your order 🛒');
                    playSound('error');
                    return;
                }
                
                openCustomerModal();
            });

            // Initialize
            renderCategoryTabs();
            renderAdminHeader();
            renderMenu();
            updateTotalOrdersDisplay();
        })();
    </script>
</body>
</html>
